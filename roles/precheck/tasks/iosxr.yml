---
- name: Get last commit ID before changes
  cisco.iosxr.iosxr_command:
    commands:
      - show configuration commit list 1
  register: precheck_commit_list
  tags: pre_flight

- name: Save revert point to file
  ansible.builtin.copy:
    content: "revert_point: \"{{ precheck_commit_list.stdout[0] | regex_search('\\b\\d{10}\\b') }}\"\n"
    dest: "{{ playbook_dir }}/../revert_points/{{ inventory_hostname }}.yml"
    mode: "0644"
  delegate_to: localhost
  tags: pre_flight

- name: Display revert point
  ansible.builtin.debug:
    msg: |
      Revert point saved for {{ inventory_hostname }}:
      {{ precheck_commit_list.stdout[0] }}
      To revert: rollback configuration to {{ precheck_commit_list.stdout[0] | regex_search('\b\d{10}\b') }}
  tags: pre_flight
