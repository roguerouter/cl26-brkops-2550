---
- name: Create pre-check archive snapshot
  cisco.ios.ios_command:
    commands:
      - archive config
  tags: precheck

- name: Get current archive list
  cisco.ios.ios_command:
    commands:
      - show archive
  register: precheck_archive_list
  tags: precheck

- name: Debug archive output
  ansible.builtin.debug:
    msg: "{{ precheck_archive_list.stdout[0] }}"
  tags: precheck

- name: Save revert point to file
  ansible.builtin.copy:
    content: "revert_point: \"{{ precheck_archive_list.stdout[0] | regex_findall('\\w+:archive-[\\w.-]+') | last }}\"\n"
    dest: "{{ playbook_dir }}/../revert_points/{{ inventory_hostname }}.yml"
    mode: "0644"
  delegate_to: localhost
  tags: precheck

- name: Display revert point
  ansible.builtin.debug:
    msg: >-
      Revert point saved:
      {{ precheck_archive_list.stdout[0] | regex_findall('flash:archive-[\w.-]+') | last }}
      — revert with: configure replace <archive> force
  tags: precheck
