---
# ==============================================
# OSPFv2 (IPv4) Configuration
# ==============================================

- name: Configure OSPF process
  cisco.nxos.nxos_ospfv2:
    config:
      processes:
        - process_id: "{{ ospf.process_id }}"
          router_id: "{{ ospf.router_id }}"
          auto_cost:
            reference_bandwidth: "{{ ospf.reference_bandwidth }}"
            unit: "{{ ospf.reference_bandwidth_unit }}"
    state: merged
  notify: save config
  tags: ospf

- name: Configure OSPF on P2P interfaces
  cisco.nxos.nxos_config:
    lines:
      - ip router ospf {{ ospf.process_id }} area {{ item.ospf_area }}
      - ip ospf network point-to-point
    parents:
      - interface {{ item.name }}
  loop: "{{ p2p_interfaces | default([]) }}"
  when:
    - ospf is defined
    - item.ospf_area is defined
  notify: save config
  tags: ospf

- name: Configure OSPF on SVI interfaces
  cisco.nxos.nxos_config:
    lines:
      - ip router ospf {{ ospf.process_id }} area {{ item.ospf_area }}
    parents:
      - interface Vlan{{ item.vlan }}
  loop: "{{ svi_interfaces | default([]) }}"
  when:
    - ospf is defined
    - item.ospf_area is defined
  notify: save config
  tags: ospf

- name: Configure OSPF passive on SVI interfaces
  cisco.nxos.nxos_config:
    lines:
      - ip ospf passive-interface
    parents:
      - interface Vlan{{ item.vlan }}
  loop: "{{ svi_interfaces | default([]) }}"
  when:
    - ospf is defined
    - item.ospf_passive | default(false) | bool
  notify: save config
  tags: ospf
