---
- name: Generate group_vars files from template
  ansible.builtin.template:
    src: templates/all.yml.j2
    dest: "{{ playbook_dir }}/../inventory/{{ env_name }}/group_vars/all.yml"
    mode: "0644"
  run_once: true
  delegate_to: localhost

- name: Generate iosxe group_vars files from template
  ansible.builtin.template:
    src: templates/iosxe.yml.j2
    dest: "{{ playbook_dir }}/../inventory/{{ env_name }}/group_vars/iosxe.yml"
    mode: "0644"
  run_once: true
  delegate_to: localhost

- name: Generate iosxrgroup_vars files from template
  ansible.builtin.template:
    src: templates/iosxr.yml.j2
    dest: "{{ playbook_dir }}/../inventory/{{ env_name }}/group_vars/iosxr.yml"
    mode: "0644"
  run_once: true
  delegate_to: localhost

- name: Generate nxos group_vars files from template
  ansible.builtin.template:
    src: templates/nxos.yml.j2
    dest: "{{ playbook_dir }}/../inventory/{{ env_name }}/group_vars/nxos.yml"
    mode: "0644"
  run_once: true
  delegate_to: localhost

- name: Generate host_vars file from template
  ansible.builtin.template:
    src: templates/{{ inventory_hostname }}.yml.j2
    dest: "{{ playbook_dir }}/../inventory/{{ env_name }}/host_vars/{{ inventory_hostname }}.yml"
    mode: "0644"
  delegate_to: localhost

- name: Display generated config path
  ansible.builtin.debug:
    msg: "Config written to {{ playbook_dir }}/../inventory/{{ env_name }}/host_vars/{{ inventory_hostname }}.yml"
